<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1a56db" />
    <meta name="description" content="EduSchedule Pro — Système de gestion des emplois du temps ISGE" />
    <title>EduSchedule Pro</title>
    <style>
      /* Loading screen */
      #loading-screen {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: linear-gradient(135deg, #1e3a5f 0%, #1a56db 50%, #7e3af2 100%);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 99999; transition: opacity 0.5s ease;
      }
      .logo-container {
        width: 100px; height: 100px;
        background: rgba(255,255,255,0.15);
        border-radius: 28px;
        display: flex; align-items: center; justify-content: center;
        margin-bottom: 24px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        animation: pulse 2s infinite;
      }
      .logo-svg { width: 60px; height: 60px; }
      .app-name {
        font-family: 'Segoe UI', sans-serif;
        font-size: 2rem; font-weight: 900;
        color: white; letter-spacing: -1px;
        margin-bottom: 8px;
      }
      .app-name span { color: #fbbf24; }
      .app-subtitle {
        font-family: 'Segoe UI', sans-serif;
        font-size: 0.9rem; color: rgba(255,255,255,0.7);
        margin-bottom: 40px;
      }
      .loader {
        width: 200px; height: 4px;
        background: rgba(255,255,255,0.2);
        border-radius: 2px; overflow: hidden;
      }
      .loader-bar {
        height: 100%; width: 0%;
        background: linear-gradient(90deg, #fbbf24, #f59e0b);
        border-radius: 2px;
        animation: loading 1.5s ease forwards;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        50% { transform: scale(1.05); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
      }
      @keyframes loading {
        0% { width: 0%; }
        100% { width: 100%; }
      }
    </style>
  </head>
  <body>
    <noscript>Vous devez activer JavaScript pour utiliser EduSchedule Pro.</noscript>

    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="logo-container">
        <svg class="logo-svg" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Calendrier -->
          <rect x="5" y="10" width="50" height="45" rx="8" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="2"/>
          <!-- Barres du haut -->
          <rect x="18" y="4" width="4" height="14" rx="2" fill="#fbbf24"/>
          <rect x="38" y="4" width="4" height="14" rx="2" fill="#fbbf24"/>
          <!-- Ligne séparatrice -->
          <line x1="5" y1="24" x2="55" y2="24" stroke="white" stroke-width="2" opacity="0.5"/>
          <!-- Cases calendrier -->
          <rect x="12" y="30" width="8" height="7" rx="2" fill="white" opacity="0.9"/>
          <rect x="26" y="30" width="8" height="7" rx="2" fill="#fbbf24"/>
          <rect x="40" y="30" width="8" height="7" rx="2" fill="white" opacity="0.9"/>
          <rect x="12" y="42" width="8" height="7" rx="2" fill="white" opacity="0.9"/>
          <rect x="26" y="42" width="8" height="7" rx="2" fill="white" opacity="0.9"/>
          <!-- Checkmark -->
          <circle cx="42" cy="46" r="8" fill="#10b981"/>
          <path d="M38 46 L41 49 L46 43" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="app-name">EduSchedule<span>Pro</span></div>
      <div class="app-subtitle">ISGE — Système de gestion pédagogique</div>
      <div class="loader"><div class="loader-bar"></div></div>
    </div>

    <div id="root"></div>

    <script>
      // Cacher le loading screen quand React est prêt
      window.addEventListener('load', function() {
        setTimeout(function() {
          var screen = document.getElementById('loading-screen');
          if (screen) {
            screen.style.opacity = '0';
            setTimeout(function() { screen.style.display = 'none'; }, 500);
          }
        }, 1500);
      });

      // Redirection si pas connecté
      if (!localStorage.getItem('token') && window.location.pathname === '/') {
        setTimeout(function() {
          window.location.href = 'http://localhost/eduschedule-pro/html/index.html';
        }, 2000);
      }
    </script>
  </body>
</html>
